<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSW Mobile</title>
    <script>const p="Harlem1085";if(!sessionStorage.getItem("auth")){const x=prompt("Password:");if(x!==p){document.body.innerHTML="<h1 style='text-align:center;margin-top:50vh;'>Access Denied</h1>"}else{sessionStorage.setItem("auth","true")}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #10B981; --primary-dark: #059669; --white: #fff; --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--gray-50); color: var(--gray-900); padding-bottom: 100px; }
        
        .header { background: linear-gradient(135deg, #10B981, #059669); color: white; padding: 16px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; font-weight: 600; }
        
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 12px rgba(16,185,129,0.4); cursor: pointer; z-index: 99; }
        
        .section { background: white; margin: 16px; border-radius: 12px; padding: 16px; }
        .section-title { font-size: 14px; font-weight: 600; color: var(--gray-500); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--gray-100); }
        .task-item:last-child { border-bottom: none; }
        .task-company { font-size: 11px; background: var(--gray-100); padding: 2px 8px; border-radius: 4px; color: var(--gray-500); }
        .task-text { flex: 1; font-size: 14px; }
        
        .schedule-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; }
        .schedule-time { font-weight: 600; color: var(--primary); font-size: 14px; }
        .schedule-info { flex: 1; }
        .schedule-cmd { font-size: 13px; }
        .schedule-repeat { font-size: 11px; color: var(--gray-500); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
        .modal.open { display: flex; }
        .modal-content { background: white; border-radius: 16px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 16px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-500); }
        .modal-body { padding: 16px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--gray-700); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); margin-top: 8px; }
        
        .empty { text-align: center; color: var(--gray-500); padding: 24px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 JSW Task Manager</h1>
    </div>
    
    <div class="section">
        <div class="section-title">Active Tasks</div>
        <div id="taskQueue">
            <div class="empty">No tasks</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Scheduled</div>
        <div id="scheduledList">
            <div class="empty">No scheduled tasks</div>
        </div>
    </div>
    
    <div class="fab" onclick="openModal()">+</div>
    
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ New Task</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Company</label>
                    <select class="form-select" id="taskCompany">
                        <option value="jsw">🏢 JSW Enterprises</option>
                        <option value="cliniciq">🏥 Clinic IQ</option>
                        <option value="wilde">⚙️ Wilde Automations</option>
                        <option value="sam">📄 Uncle Sam's</option>
                        <option value="westwood">🌐 Westwood Network</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Task</label>
                    <textarea class="form-textarea" id="taskText" rows="3" placeholder="What needs to be done?"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="scheduleIt"> Schedule it?
                    </label>
                </div>
                <div id="scheduleOptions" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" class="form-input" id="scheduleTime">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Repeat</label>
                        <select class="form-select" id="scheduleRepeat">
                            <option value="none">One time</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3457';
        
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const pending = tasks.filter(t => t.status === 'pending');
            
            const container = document.getElementById('taskQueue');
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty">No tasks</div>';
                return;
            }
            
            container.innerHTML = pending.map(t => `
                <div class="task-item">
                    <span class="task-company">${getCompanyName(t.company)}</span>
                    <span class="task-text">${t.text}</span>
                    <button onclick="completeTask(${t.id})" style="background:#10B981;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">✓</button>
                </div>
            `).join('');
        }
        
        function loadSchedules() {
            const companies = ['jsw', 'cliniciq', 'wilde', 'sam', 'westwood'];
            let allSchedules = [];
            
            companies.forEach(c => {
                const schedules = JSON.parse(localStorage.getItem('jsw-schedules-' + c) || '[]');
                schedules.forEach(s => allSchedules.push({...s, company: c}));
            });
            
            allSchedules.sort((a, b) => a.time.localeCompare(b.time));
            
            const container = document.getElementById('scheduledList');
            if (allSchedules.length === 0) {
                container.innerHTML = '<div class="empty">No scheduled tasks</div>';
                return;
            }
            
            container.innerHTML = allSchedules.map(s => `
                <div class="schedule-item">
                    <span class="schedule-time">${s.time}</span>
                    <div class="schedule-info">
                        <div class="schedule-cmd">${s.cmd}</div>
                        <div class="schedule-repeat">${getCompanyName(s.company)} • ${s.repeat}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function getCompanyName(c) {
            const names = { jsw: 'JSW', cliniciq: 'Clinic IQ', wilde: 'Wilde Auto', sam: "Uncle Sam's", westwood: 'Westwood' };
            return names[c] || c;
        }
        
        function openModal() {
            document.getElementById('taskModal').classList.add('open');
            document.getElementById('taskText').value = '';
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('open');
            document.getElementById('scheduleOptions').style.display = 'none';
        }
        
        document.getElementById('scheduleIt').addEventListener('change', function() {
            document.getElementById('scheduleOptions').style.display = this.checked ? 'block' : 'none';
        });
        
        async function saveTask() {
            const company = document.getElementById('taskCompany').value;
            const text = document.getElementById('taskText').value.trim();
            const scheduleIt = document.getElementById('scheduleIt').checked;
            
            if (!text) { alert('Please enter a task'); return; }
            
            // Save to localStorage
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const newTask = { id: Date.now(), text, company, status: 'pending', created_at: new Date().toISOString() };
            tasks.push(newTask);
            localStorage.setItem('jsw-tasks', JSON.stringify(tasks));
            
            // Try to save to API
            try {
                await fetch(API_URL + '/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, company })
                });
            } catch(e) { console.log('API not available'); }
            
            // Schedule if needed
            if (scheduleIt) {
                const time = document.getElementById('scheduleTime').value;
                const repeat = document.getElementById('scheduleRepeat').value;
                if (time) {
                    const schedules = JSON.parse(localStorage.getItem('jsw-schedules-' + company) || '[]');
                    schedules.push({ cmd: text, time, repeat, id: Date.now() });
                    localStorage.setItem('jsw-schedules-' + company, JSON.stringify(schedules));
                }
            }
            
            closeModal();
            loadTasks();
            loadSchedules();
        }
        
        function completeTask(id) {
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = 'completed';
                task.completed_at = new Date().toISOString();
                localStorage.setItem('jsw-tasks', JSON.stringify(tasks));
                loadTasks();
            }
        }
        
        loadTasks();
        loadSchedules();
    </script>
</body>
</html>
