<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSW Mobile</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #EF4444; 
            --primary-dark: #DC2626; 
            --primary-light: #FCA5A5;
            --white: #fff; 
            --gray-50: #F9FAFB; 
            --gray-100: #F3F4F6; 
            --gray-200: #E5E7EB; 
            --gray-300: #D1D5DB;
            --gray-500: #6B7280; 
            --gray-700: #374151; 
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; 
            background: linear-gradient(180deg, #FEE2E2 0%, var(--gray-50) 100%); 
            color: var(--gray-900); 
            padding-bottom: 120px;
            min-height: 100vh;
        }
        
        .header { 
            background: linear-gradient(135deg, #EF4444, #DC2626); 
            color: white; 
            padding: 20px 16px 60px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow-lg);
        }
        .header h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header-stats { display: flex; gap: 16px; margin-top: 16px; }
        .header-stat { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; font-size: 13px; }
        
        .container { padding: 0 16px; margin-top: -40px; }
        
        .section { 
            background: white; 
            margin-bottom: 16px; 
            border-radius: 16px; 
            padding: 16px; 
            box-shadow: var(--shadow-md);
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
        .section-badge { background: var(--primary); color: white; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        
        .task-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px; 
            background: var(--gray-50);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .task-item:active { transform: scale(0.98); }
        .task-item:last-child { margin-bottom: 0; }
        .task-company { 
            font-size: 10px; 
            background: linear-gradient(135deg, #EF4444, #DC2626); 
            padding: 4px 10px; 
            border-radius: 20px; 
            color: white; 
            font-weight: 600;
            white-space: nowrap;
        }
        .task-text { flex: 1; font-size: 14px; font-weight: 500; }
        .task-check { 
            width: 28px; height: 28px; 
            border: 2px solid var(--gray-300); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .task-check:hover { border-color: var(--primary); background: var(--primary-light); }
        
        .schedule-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px; 
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            border-radius: 12px; 
            margin-bottom: 8px;
            border-left: 4px solid #F59E0B;
        }
        .schedule-time { 
            font-weight: 700; 
            color: #92400E; 
            font-size: 15px; 
            min-width: 70px;
        }
        .schedule-info { flex: 1; }
        .schedule-cmd { font-size: 14px; font-weight: 500; color: var(--gray-900); }
        .schedule-repeat { 
            font-size: 11px; 
            background: rgba(255,255,255,0.7);
            padding: 3px 8px; 
            border-radius: 10px; 
            color: #92400E;
            font-weight: 600;
        }
        
        .fab { 
            position: fixed; 
            bottom: 32px; 
            right: 24px; 
            width: 60px; 
            height: 60px; 
            background: linear-gradient(135deg, #EF4444, #DC2626); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 28px; 
            box-shadow: 0 8px 20px rgba(239,68,68,0.4); 
            cursor: pointer; 
            z-index: 99;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.95); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 200; }
        .modal.open { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content { 
            background: white; 
            border-radius: 24px 24px 0 0; 
            width: 100%; 
            max-width: 500px; 
            max-height: 90vh; 
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        .modal-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 20px; font-weight: 700; }
        .modal-close { background: var(--gray-100); width: 32px; height: 32px; border: none; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--gray-700); }
        .modal-body { padding: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--gray-700); }
        .form-input, .form-select, .form-textarea { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid var(--gray-200); 
            border-radius: 12px; 
            font-size: 15px; 
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
        .form-textarea { min-height: 100px; resize: none; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); margin-top: 12px; }
        
        .empty { text-align: center; color: var(--gray-400); padding: 32px; font-size: 14px; }
        
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .time-select { padding: 12px; border: 2px solid var(--gray-200); border-radius: 10px; font-size: 15px; background: white; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .checkbox-item { 
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; 
            background: var(--gray-100); 
            border-radius: 20px; 
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item input { display: none; }
        .checkbox-item.checked { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ JSW Mobile</h1>
        <div class="header-stats">
            <div class="header-stat">📋 <span id="taskCount">0</span> Tasks</div>
            <div class="header-stat">⏰ <span id="scheduleCount">0</span> Scheduled</div>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <div class="section-header">
                <div class="section-title">Active Tasks</div>
                <div class="section-badge" id="taskBadge">0</div>
            </div>
            <div id="taskQueue">
                <div class="empty">No tasks yet</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <div class="section-title">Scheduled</div>
                <div class="section-badge" id="scheduleBadge" style="background:#F59E0B;">0</div>
            </div>
            <div id="scheduledList">
                <div class="empty">No scheduled tasks</div>
            </div>
        </div>
    </div>
    
    <div class="fab" onclick="openModal()">+</div>
    
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ New Task</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Company</label>
                    <select class="form-select" id="taskCompany">
                        <option value="jsw">🏢 JSW Enterprises</option>
                        <option value="cliniciq">🏥 Clinic IQ</option>
                        <option value="wilde">⚙️ Wildrose Automations</option>
                        <option value="sam">📄 Uncle Sam's</option>
                        <option value="westwood">🌐 Westwood Network</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Task</label>
                    <textarea class="form-textarea" id="taskText" rows="3" placeholder="What needs to be done?"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="scheduleIt"> Schedule it?
                    </label>
                </div>
                <div id="scheduleOptions" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <div style="display:flex;gap:8px;">
                            <select class="form-select" id="scheduleHour" style="flex:1;">
                                <option value="01">1</option><option value="02">2</option><option value="03">3</option><option value="04">4</option><option value="05">5</option><option value="06">6</option><option value="07">7</option><option value="08">8</option><option value="09">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                            </select>
                            <select class="form-select" id="scheduleMinute" style="flex:1;">
                                <option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
                            </select>
                            <select class="form-select" id="scheduleAMPM" style="flex:1;">
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Repeat</label>
                        <select class="form-select" id="scheduleRepeat" onchange="toggleCustomDays()">
                            <option value="none">One time</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div id="customDays" style="display:none;" class="form-group">
                        <label class="form-label">Select Days</label>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;">
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="0"> Sun</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="1"> Mon</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="2"> Tue</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="3"> Wed</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="4"> Thu</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="5"> Fri</label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;"><input type="checkbox" value="6"> Sat</label>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3457';
        const SCHEDULE_WEBHOOK = 'https://jackwilde.app.n8n.cloud/webhook/ea513425-fb54-4273-b1e2-fc763c835ea4';
        
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const pending = tasks.filter(t => t.status === 'pending');
            
            // Update stats
            document.getElementById('taskCount').textContent = pending.length;
            document.getElementById('taskBadge').textContent = pending.length;
            
            const container = document.getElementById('taskQueue');
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty">No tasks yet</div>';
                return;
            }
            
            container.innerHTML = pending.map(t => `
                <div class="task-item">
                    <span class="task-company">${getCompanyName(t.company)}</span>
                    <span class="task-text">${t.text}</span>
                    <div class="task-check" onclick="completeTask(${t.id})">✓</div>
                </div>
            `).join('');
        }
        
        function loadSchedules() {
            const companies = ['jsw', 'cliniciq', 'wilde', 'sam', 'westwood'];
            let allSchedules = [];
            
            companies.forEach(c => {
                const schedules = JSON.parse(localStorage.getItem('jsw-schedules-' + c) || '[]');
                schedules.forEach(s => allSchedules.push({...s, company: c}));
            });
            
            // Update stats
            document.getElementById('scheduleCount').textContent = allSchedules.length;
            document.getElementById('scheduleBadge').textContent = allSchedules.length;
            
            allSchedules.sort((a, b) => a.time.localeCompare(b.time));
            
            const container = document.getElementById('scheduledList');
            if (allSchedules.length === 0) {
                container.innerHTML = '<div class="empty">No scheduled tasks</div>';
                return;
            }
            
            container.innerHTML = allSchedules.map(s => `
                <div class="schedule-item">
                    <span class="schedule-time">${s.time}</span>
                    <div class="schedule-info">
                        <div class="schedule-cmd">${s.cmd}</div>
                        <div class="schedule-repeat">${getCompanyName(s.company)} • ${s.repeat}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function getCompanyName(c) {
            const names = { jsw: 'JSW', cliniciq: 'Clinic IQ', wilde: 'Wildrose Auto', sam: "Uncle Sam's", westwood: 'Westwood' };
            return names[c] || c;
        }
        
        function openModal() {
            document.getElementById('taskModal').classList.add('open');
            document.getElementById('taskText').value = '';
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('open');
            document.getElementById('scheduleOptions').style.display = 'none';
        }
        
        document.getElementById('scheduleIt').addEventListener('change', function() {
            document.getElementById('scheduleOptions').style.display = this.checked ? 'block' : 'none';
        });
        
        async function saveTask() {
            const company = document.getElementById('taskCompany').value;
            const text = document.getElementById('taskText').value.trim();
            const scheduleIt = document.getElementById('scheduleIt').checked;
            
            if (!text) { alert('Please enter a task'); return; }
            
            // Save to localStorage
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const newTask = { id: Date.now(), text, company, status: 'pending', created_at: new Date().toISOString() };
            tasks.push(newTask);
            localStorage.setItem('jsw-tasks', JSON.stringify(tasks));
            
            // Try to save to API
            try {
                await fetch(API_URL + '/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, company })
                });
            } catch(e) { console.log('API not available'); }
            
            // Schedule if needed
            if (scheduleIt) {
                const hour = document.getElementById('scheduleHour').value;
                const minute = document.getElementById('scheduleMinute').value;
                const ampm = document.getElementById('scheduleAMPM').value;
                const time = hour + ':' + minute + ' ' + ampm;
                const repeat = document.getElementById('scheduleRepeat').value;
                let customDays = [];
                if (repeat === 'custom') {
                    const checkboxes = document.querySelectorAll('#customDays input:checked');
                    checkboxes.forEach(cb => customDays.push(cb.value));
                }
                if (time) {
                    const schedules = JSON.parse(localStorage.getItem('jsw-schedules-' + company) || '[]');
                    schedules.push({ cmd: text, time, repeat, customDays, id: Date.now() });
                    localStorage.setItem('jsw-schedules-' + company, JSON.stringify(schedules));
                    
                    // Send to webhook
                    try {
                        await fetch(SCHEDULE_WEBHOOK + '?company=' + encodeURIComponent(company) + '&task=' + encodeURIComponent(text) + '&time=' + encodeURIComponent(time) + '&repeat=' + encodeURIComponent(repeat));
                    } catch(e) { console.log('Webhook error:', e); }
                }
            }
            
            closeModal();
            loadTasks();
            loadSchedules();
        }
        
        function toggleCustomDays() {
            const repeat = document.getElementById('scheduleRepeat').value;
            document.getElementById('customDays').style.display = repeat === 'custom' ? 'block' : 'none';
        }
        
        function completeTask(id) {
            const tasks = JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = 'completed';
                task.completed_at = new Date().toISOString();
                localStorage.setItem('jsw-tasks', JSON.stringify(tasks));
                loadTasks();
            }
        }
        
        loadTasks();
        loadSchedules();
    </script>
</body>
</html>
